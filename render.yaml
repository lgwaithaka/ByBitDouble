services:
  # ── MCP Server (Claude Desktop connects here) ─────────────────────────────
  - type: web
    name: bybit-compound-mcp
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    plan: starter
    disk:
      name: compound-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: BYBIT_API_KEY
        sync: false
      - key: BYBIT_API_SECRET
        sync: false
      - key: BYBIT_TESTNET
        value: "false"
      - key: DB_PATH
        value: /data/compound.db
      - key: REPORT_EMAIL
        value: lgwaithaka@gmail.com
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false

  # ── Visual Dashboard (open this URL in your browser) ─────────────────────
  - type: web
    name: bybit-compound-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn dashboard_api:app --host 0.0.0.0 --port $PORT
    plan: starter
    disk:
      name: compound-data        # SAME disk name = shared SQLite database
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DB_PATH
        value: /data/compound.db


  # 3. Enable auto-restart on crash
  #    In render.yaml, add:
    healthCheckPath: /health
    healthCheckTimeout: 30

services:
  - type: web
    name: bybitdouble-lg
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: BYBIT_API_KEY
        sync: false
      - key: BYBIT_API_SECRET
        sync: false
      - key: BYBIT_TESTNET
        value: "false"
      - key: DB_PATH
        value: "/data/compound.db"
      - key: REPORT_EMAIL
        value: "lgwaithaka@gmail.com"
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
    healthCheckPath: /health
    plan: starter

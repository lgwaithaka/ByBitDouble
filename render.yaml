services:
  - type: web
    name: bybit-compound-mcp
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    plan: starter
    disk:
      name: compound-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: BYBIT_API_KEY
        sync: false
      - key: BYBIT_API_SECRET
        sync: false
      - key: BYBIT_TESTNET
        value: "false"
      - key: DB_PATH
        value: /data/compound.db
      - key: REPORT_EMAIL
        value: lgwaithaka@gmail.com
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false

  - type: web
    name: bybit-compound-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn dashboard_api:app --host 0.0.0.0 --port 8080
    plan: starter
    disk:
      name: compound-data    # SAME disk — shared SQLite
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DB_PATH
        value: /data/compound.db
